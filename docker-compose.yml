services:
  postgres:
    image: postgres:16-alpine
    container_name: doc-drift-detector-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drift_detector
    ports:
      - "5432:5432"
    volumes:
      - drift_detector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  drift_detector_data:
